<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Kalkulator rezystora</title>

<style>
body{
  font-family:Arial;
  text-align:center;
  background:#f2f2f2;
}

.rezystor-container{
  margin:60px auto;
}

.rezystor{
  display:flex;
  align-items:center;
  justify-content:center;
  margin-top:20px;
}

.przewod{
  width:80px;
  height:6px;
  background:#777;
}

.korpus{
  width:360px;
  height:70px;
  background:#e6d3a3;
  border-radius:12px;
  padding:0 10px;
  display:flex;
  align-items:center;
}

.cyfry{
  display:flex;
  gap:50px;
}

.mnoznik{
  margin-left:80px;
}

.tolerancja{
  margin-left:80px;
}

.pasek{
  width:17px;
  height:70px;
  border:1px solid #333;
  cursor:pointer;
}

#wynik5, #wynik4{
  margin-top:20px;
  font-size:20px;
  font-weight:bold;
}

select{
  position:absolute;
  display:none;
}
</style>
</head>

<body>

<h2>Kalkulator rezystora</h2>

<!-- 5 pasków -->
<div class="rezystor-container">
  <div class="rezystor" id="rezystor5">
    <div class="przewod"></div>
    <div class="korpus">
      <div class="cyfry">
        <div class="pasek"></div>
        <div class="pasek"></div>
        <div class="pasek"></div>
      </div>
      <div class="mnoznik"><div class="pasek"></div></div>
      <div class="tolerancja"><div class="pasek"></div></div>
    </div>
    <div class="przewod"></div>
  </div>
  <div id="wynik5">-</div>
</div>

<!-- 4 paski -->
<div class="rezystor-container">
  <div class="rezystor" id="rezystor4">
    <div class="przewod"></div>
    <div class="korpus">
      <div class="cyfry">
        <div class="pasek"></div>
        <div class="pasek"></div>
      </div>
      <div class="mnoznik"><div class="pasek"></div></div>
      <div class="tolerancja"><div class="pasek"></div></div>
    </div>
    <div class="przewod"></div>
  </div>
  <div id="wynik4">-</div>
</div>

<select id="menuKolorow"></select>

<script>
// ===== MAPY =====
const cyfry = {
  "#000000":0,"#8b4513":1,"#ff0000":2,"#ffa500":3,"#ffff00":4,
  "#008000":5,"#0000ff":6,"#800080":7,"#808080":8,"#ffffff":9
};

const mnozniki = {
  "#000000":1,"#8b4513":10,"#ff0000":100,"#ffa500":1000,"#ffff00":10000,
  "#008000":100000,"#0000ff":1000000,"#ffd700":0.1,"#c0c0c0":0.01
};

const tolerancje = {
  "#8b4513":"±1%","#ff0000":"±2%","#ffd700":"±5%","#c0c0c0":"±10%"
};

// ===== KOLORY =====
const wszystkieKolory = [
  ["#000000","Czarny"],["#8B4513","Brązowy"],["#FF0000","Czerwony"],
  ["#FFA500","Pomarańczowy"],["#FFFF00","Żółty"],["#008000","Zielony"],
  ["#0000FF","Niebieski"],["#800080","Fioletowy"],["#808080","Szary"],
  ["#FFFFFF","Biały"],["#FFD700","Złoty"],["#C0C0C0","Srebrny"]
];

const koloryTolerancji = [
  ["#8B4513","Brązowy"],
  ["#FF0000","Czerwony"],
  ["#FFD700","Złoty"],
  ["#C0C0C0","Srebrny"]
];

let aktywnyPasek = null;
let aktualnaFunkcja = null;
const menu = document.getElementById("menuKolorow");

// ===== FUNKCJE =====
function ustawMenu(lista){
  menu.innerHTML="";
  lista.forEach(k=>{
    const o=document.createElement("option");
    o.value=k[0];
    o.textContent=k[1];
    menu.appendChild(o);
  });
}

function hex(rgb){
  const m = rgb.match(/\d+/g);
  return "#"+[m[0],m[1],m[2]]
    .map(x=>parseInt(x).toString(16).padStart(2,"0"))
    .join("");
}

function kolor(el){
  return hex(getComputedStyle(el).backgroundColor);
}

function format(v){
  if(v>=1e6) return (v/1e6).toFixed(2).replace(/\.00$/,"")+" MΩ";
  if(v>=1e3) return (v/1e3).toFixed(2).replace(/\.00$/,"")+" kΩ";
  return v+" Ω";
}

// ===== INIT =====
function init(id, typ, wynik){
  const cyf = document.querySelectorAll(`#${id} .cyfry .pasek`);
  const mnoz = document.querySelector(`#${id} .mnoznik .pasek`);
  const tol = document.querySelector(`#${id} .tolerancja .pasek`);

  function licz(){
    let val=0;

    if(typ==="5"){
      val=((cyfry[kolor(cyf[0])]||0)*100+
           (cyfry[kolor(cyf[1])]||0)*10+
           (cyfry[kolor(cyf[2])]||0))*
           (mnozniki[kolor(mnoz)]||1);
    }else{
      val=((cyfry[kolor(cyf[0])]||0)*10+
           (cyfry[kolor(cyf[1])]||0))*
           (mnozniki[kolor(mnoz)]||1);
    }

    const tolStr=tolerancje[kolor(tol)]||"";
    let p=0;
    if(tolStr) p=parseFloat(tolStr.replace("±",""))/100;

    const min=Math.round(val*(1-p));
    const max=Math.round(val*(1+p));

    document.getElementById(wynik).innerText=
      `${format(val)} ${tolStr} (${format(min)} – ${format(max)})`;
  }

  [...cyf, mnoz, tol].forEach(p=>{
    p.style.background="#000000";

    p.onclick=(e)=>{
      aktywnyPasek=p;
      aktualnaFunkcja=licz;

      if(p===tol) ustawMenu(koloryTolerancji);
      else ustawMenu(wszystkieKolory);

      menu.style.display="block";
      menu.style.left=e.pageX+"px";
      menu.style.top=e.pageY+"px";
    };
  });
}

// ===== MENU EVENT =====
menu.addEventListener("change", ()=>{
  if(aktywnyPasek){
    aktywnyPasek.style.background=menu.value;
    menu.style.display="none";
    aktualnaFunkcja();
  }
});

// start
init("rezystor5","5","wynik5");
init("rezystor4","4","wynik4");

</script>
</body>
</html>
