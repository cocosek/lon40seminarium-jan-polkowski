<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Działania na ułamkach</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 40px;
        }

        h1 {
            margin-bottom: 40px;
        }

        .table-section {
            margin-bottom: 50px;
        }

        table {
            margin: 0 auto 15px auto;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px 20px;
            border: 1px solid #ccc;
        }

        .fraction {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .fraction input {
            width: 60px;
            text-align: center;
            font-size: 18px;
        }

        .line {
            width: 60px;
            height: 2px;
            background: black;
            margin: 4px 0;
        }

        button {
            padding: 8px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 30px;
            text-decoration: none;
            font-size: 16px;
        }
    </style>
</head>

<body>

    <h1>Działania na ułamkach</h1>
    <a href="index.html" class="back-btn">Powrót</a>

    <!-- DODAWANIE -->
    <section class="table-section">
        <h2>Dodawanie ułamków</h2>

        <table>
            <tr>
                <th>Pierwszy ułamek</th>
                <th>Drugi ułamek</th>
                <th>Wynik</th>
            </tr>
            <tr>
                <td class="fraction">
                    <input type="number" id="a1">
                    <div class="line"></div>
                    <input type="number" id="b1">
                </td>

                <td class="fraction">
                    <input type="number" id="a2">
                    <div class="line"></div>
                    <input type="number" id="b2">
                </td>

                <td class="fraction">
                    <input type="number" id="r1" readonly>
                    <div class="line"></div>
                    <input type="number" id="r2" readonly>
                </td>
            </tr>
        </table>

        <button onclick="dodawanie()">Oblicz</button>
    </section>


    <!-- ODEJMOWANIE -->
    <section class="table-section">
        <h2>Odejmowanie ułamków</h2>

        <table>
            <tr>
                <th>Pierwszy ułamek</th>
                <th>Drugi ułamek</th>
                <th>Wynik</th>
            </tr>
            <tr>
                <td class="fraction">
                    <input type="number" id="c1">
                    <div class="line"></div>
                    <input type="number" id="d1">
                </td>

                <td class="fraction">
                    <input type="number" id="c2">
                    <div class="line"></div>
                    <input type="number" id="d2">
                </td>

                <td class="fraction">
                    <input type="number" id="r3" readonly>
                    <div class="line"></div>
                    <input type="number" id="r4" readonly>
                </td>
            </tr>
        </table>

        <button onclick="odejmowanie()">Oblicz</button>
    </section>


    <script>
        function dodawanie() {
            let a1 = document.getElementById("a1").value;
            let b1 = document.getElementById("b1").value;
            let a2 = document.getElementById("a2").value;
            let b2 = document.getElementById("b2").value;

            if (a1 === "" || b1 === "" || a2 === "" || b2 === "") return;

            a1 = parseInt(a1);
            b1 = parseInt(b1);
            a2 = parseInt(a2);
            b2 = parseInt(b2);

            if (b1 === 0 || b2 === 0) {
                alert("Mianownik nie może być zerem!");
                return;
            }

            let licznik = a1 * b2 + a2 * b1;
            let mianownik = b1 * b2;

            document.getElementById("r1").value = licznik;
            document.getElementById("r2").value = mianownik;
        }

        function odejmowanie() {
            let c1 = document.getElementById("c1").value;
            let d1 = document.getElementById("d1").value;
            let c2 = document.getElementById("c2").value;
            let d2 = document.getElementById("d2").value;

            if (c1 === "" || d1 === "" || c2 === "" || d2 === "") return;

            c1 = parseInt(c1);
            d1 = parseInt(d1);
            c2 = parseInt(c2);
            d2 = parseInt(d2);

            if (d1 === 0 || d2 === 0) {
                alert("Mianownik nie może być zerem!");
                return;
            }

            let licznik = c1 * d2 - c2 * d1;
            let mianownik = d1 * d2;

            document.getElementById("r3").value = licznik;
            document.getElementById("r4").value = mianownik;
        }
    </script>

</body>
</html>
